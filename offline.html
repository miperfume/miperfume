<!DOCTYPE html>

<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline — MI Perfume</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f0e8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 80px; height: 80px;
      border-radius: 16px;
      object-fit: cover;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(163,141,88,0.3);
    }
    h1 { font-size: 1.5rem; color: #a38d58; font-weight: 800; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #666; line-height: 1.6; max-width: 280px; margin-bottom: 2rem; }
    .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    button {
      background: #a38d58;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(163,141,88,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    button:active { transform: scale(0.97); }
    .hint { font-size: 0.75rem; color: #999; margin-top: 1rem; }
  </style>
</head>
<body>
  <img src="/logo.jpeg" class="logo" alt="MI Perfume" onerror="this.style.display='none'">
  <span class="icon">📡</span>
  <h1>Tidak Ada Koneksi</h1>
  <p>Periksa koneksi internet Anda, lalu coba lagi. Data yang sudah dimuat sebelumnya mungkin masih tersedia.</p>
  <button onclick="location.reload()">🔄 Coba Lagi</button>
  <p class="hint">MI Perfume · Toko Parfum Refill Online</p>
</body>
</html>
