<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<script>
// GitHub Pages PWA fix — redirect 404 ke path yang benar
const path = window.location.pathname;
if (path.startsWith('/admin')) {
    window.location.replace('/admin/');
} else {
    window.location.replace('/');
}
</script>
</head>
<body></body>
</html>
