<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pesan - MI Perfume</title>
    <link rel="apple-touch-icon" href="logo.jpeg">
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        .text-gold { color: #a38d58; }
        .bg-gold { background-color: #a38d58; }
        .tab-active { border-bottom: 3px solid #a38d58; color: #a38d58; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans pb-24">

    <div class="p-6 bg-white dark:bg-gray-800 shadow-sm flex justify-between items-center sticky top-0 z-40">
        <div>
            <h1 class="text-xl font-black tracking-tighter uppercase">MI <span class="text-gold">Perfume</span></h1>
            <p id="user-display" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Guest User</p>
        </div>
        <button onclick="toggleDarkMode()" class="p-2 bg-gray-100 dark:bg-gray-700 rounded-full">🌓</button>
    </div>

    <div class="flex border-b dark:border-gray-700 bg-white dark:bg-gray-800 sticky top-[76px] z-40">
        <button onclick="switchTab('pesan')" id="tab-pesan" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest tab-active">Beli</button>
        <button onclick="switchTab('riwayat')" id="tab-riwayat" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest text-gray-400">Riwayat</button>
    </div>

    <div id="content-pesan" class="p-4 space-y-6">
        <div id="list-bibit" class="grid grid-cols-2 gap-4">
            </div>
    </div>

    <div id="content-riwayat" class="p-4 hidden space-y-4">
        <div id="list-riwayat" class="space-y-4">
            <p class="text-center text-gray-400 text-xs py-10 font-bold uppercase tracking-widest">Belum ada pesanan</p>
        </div>
    </div>

    <div id="modal-qris" class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl w-full max-w-sm text-center">
            <h3 class="font-black uppercase tracking-widest mb-4">Scan QRIS</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=ContohPembayaran" class="w-full rounded-2xl mb-6 shadow-xl" alt="QRIS">
            <button onclick="tutupQris()" class="w-full bg-gold text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest">Tutup</button>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-6 left-6 right-6 bg-gray-900 dark:bg-gold text-white p-4 rounded-3xl shadow-2xl flex justify-between items-center z-50 hidden transition-all">
        <div>
            <p id="cart-count" class="text-[10px] font-bold uppercase tracking-widest opacity-70">0 Item</p>
            <p id="cart-total" class="font-black text-lg">Rp 0</p>
        </div>
        <button onclick="checkout()" class="bg-white text-gray-900 px-8 py-3 rounded-2xl font-black uppercase text-[11px] tracking-tighter">Pesan Sekarang</button>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSy...", // Ganti dengan config asli Anda
            authDomain: "mi-perfume.firebaseapp.com",
            projectId: "mi-perfume",
            storageBucket: "mi-perfume.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let cart = [];
        let currentUid = "";

        // AUTH & LOAD
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUid = user.uid;
                document.getElementById('user-display').innerText = user.email;
                loadBibit();
                tampilRiwayat();
            } else {
                auth.signInAnonymously();
            }
        });

        function loadBibit() {
            db.collection("stok").onSnapshot(snap => {
                const list = document.getElementById('list-bibit');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const id = doc.id;
                    // Tampilkan hanya jika ada stok di salah satu kelas
                    list.innerHTML += `
                        <div class="bg-white dark:bg-gray-800 p-4 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700">
                            <h3 class="font-bold text-sm mb-1">${d.nama}</h3>
                            <select id="kelas-${id}" class="w-full text-[10px] font-bold uppercase bg-gray-50 dark:bg-gray-700 p-2 rounded-xl border-none outline-none mb-3">
                                <option value="Standar">Standar</option>
                                <option value="Premium">Premium</option>
                                <option value="Super Premium">Super Premium</option>
                                <option value="Diamond">Diamond</option>
                            </select>
                            <button onclick="addToCart('${id}', '${d.nama}')" class="w-full bg-gray-100 dark:bg-gray-700 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-gold hover:text-white transition-colors">+</button>
                        </div>
                    `;
                });
            });
        }

        function addToCart(id, nama) {
            const kelas = document.getElementById(`kelas-${id}`).value;
            // Fetch harga dari Firestore stok
            db.collection("stok").doc(id).get().then(doc => {
                const harga = doc.data().harga_kelas[kelas] || 0;
                cart.push({ id, nama, kelas, harga, qty: 1 });
                updateCartUI();
            });
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            if(cart.length > 0) {
                bar.classList.remove('hidden');
                const total = cart.reduce((sum, item) => sum + item.harga, 0);
                document.getElementById('cart-count').innerText = `${cart.length} Item`;
                document.getElementById('cart-total').innerText = `Rp ${total.toLocaleString()}`;
            } else {
                bar.classList.add('hidden');
            }
        }

        async function checkout() {
            if(cart.length === 0) return;
            const total = cart.reduce((sum, item) => sum + item.harga, 0);
            const orderData = {
                uid: currentUid,
                items: cart.map(i => ({ aroma: i.nama, qty: i.qty, kelas: i.kelas, bibitId: i.id })),
                total: total,
                status: "Menunggu di proses",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection("pesanan").add(orderData);
            alert("Pesanan berhasil dibuat!");
            cart = [];
            updateCartUI();
            switchTab('riwayat');
        }

        function tampilRiwayat() {
            db.collection("pesanan").where("uid", "==", currentUid).orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('list-riwayat');
                list.innerHTML = '';
                if(snap.empty) {
                    list.innerHTML = '<p class="text-center text-gray-400 text-xs py-10 font-bold uppercase tracking-widest">Belum ada pesanan</p>';
                    return;
                }
                snap.forEach(doc => {
                    const d = doc.data();
                    let sColor = "bg-gray-100 text-gray-400";
                    if(d.status === "Sedang di proses") sColor = "bg-blue-100 text-blue-500";
                    if(d.status === "Selesai") sColor = "bg-green-100 text-green-500";
                    
                    let qrisBtn = (d.status === "Selesai") ? `<button onclick="bukaQris()" class="w-full mt-3 bg-gray-900 text-white py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Bayar dengan QRIS</button>` : '';

                    list.innerHTML += `
                        <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Order ID: ...${doc.id.slice(-5)}</span>
                                <span class="text-[9px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter ${sColor}">${d.status}</span>
                            </div>
                            <div class="space-y-1 mb-3">
                                ${d.items.map(i => `<p class="text-xs font-medium">${i.qty}x <span class="text-gray-400">${i.aroma} (${i.kelas})</span></p>`).join('')}
                            </div>
                            <div class="flex justify-between items-center pt-3 border-t dark:border-gray-700">
                                <span class="text-[10px] font-bold text-gray-400 uppercase">Total</span>
                                <span class="text-sm font-bold text-gold">Rp ${d.total.toLocaleString()}</span>
                            </div>
                            ${qrisBtn}
                        </div>`;
                });
            });
        }

        function switchTab(t) {
            document.getElementById('content-pesan').classList.add('hidden');
            document.getElementById('content-riwayat').classList.add('hidden');
            document.getElementById('tab-pesan').classList.remove('tab-active');
            document.getElementById('tab-riwayat').classList.remove('tab-active');
            
            document.getElementById('content-' + t).classList.remove('hidden');
            document.getElementById('tab-' + t).classList.add('tab-active');
        }

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
        function bukaQris() { document.getElementById('modal-qris').classList.remove('hidden'); document.getElementById('modal-qris').classList.add('flex'); }
        function tutupQris() { document.getElementById('modal-qris').classList.add('hidden'); document.getElementById('modal-qris').classList.remove('flex'); }
    </script>
</body>
</html>
