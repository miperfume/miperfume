<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard - MI Perfume</title>
    <link rel="apple-touch-icon" href="logo.jpeg">
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        .tab-active { border-bottom: 3px solid #a38d58; color: #a38d58; font-weight: bold; }
        .text-gold { color: #a38d58; } .bg-gold { background-color: #a38d58; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-10">

    <div class="p-6 bg-white shadow-sm flex justify-between items-center sticky top-0 z-40">
        <h1 class="font-black tracking-tighter uppercase text-xl">Admin <span class="text-gold">Panel</span></h1>
        <div id="admin-info" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Loading...</div>
    </div>

    <div class="flex border-b bg-white sticky top-[76px] z-40">
        <button onclick="switchTab('pesanan')" id="t-pesanan" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest tab-active">Pesanan</button>
        <button onclick="switchTab('stok')" id="t-stok" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Stok Bibit</button>
        <button onclick="switchTab('analitik')" id="t-analitik" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Analitik</button>
    </div>

    <div id="sec-pesanan" class="p-4 space-y-4">
        <h2 class="text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Perlu Diproses</h2>
        <div id="list-admin-pesanan" class="space-y-4">
            </div>
    </div>

    <div id="sec-stok" class="p-4 hidden space-y-6">
        <form onsubmit="handleSimpanBibit(event)" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-4">
            <h3 class="text-xs font-black uppercase tracking-widest text-gold">Input/Update Bibit</h3>
            <input type="text" id="nama-bibit" placeholder="NAMA BIBIT" class="w-full border p-4 rounded-2xl text-sm font-bold uppercase outline-none" required>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-3">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Harga /ml</p>
                    <input type="number" id="h-Standar" placeholder="Standar" class="w-full border p-3 rounded-xl text-xs font-bold">
                    <input type="number" id="h-Premium" placeholder="Premium" class="w-full border p-3 rounded-xl text-xs font-bold">
                    <input type="number" id="h-Super-Premium" placeholder="Super Premium" class="w-full border p-3 rounded-xl text-xs font-bold">
                    <input type="number" id="h-Diamond" placeholder="Diamond" class="w-full border p-3 rounded-xl text-xs font-bold">
                </div>
                <div class="space-y-3">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Tambah Stok (ml)</p>
                    <input type="number" id="s-Standar" placeholder="ml" class="w-full border p-3 rounded-xl text-xs font-bold">
                    <input type="number" id="s-Premium" placeholder="ml" class="w-full border p-3 rounded-xl text-xs font-bold">
                    <input type="number" id="s-Super-Premium" placeholder="ml" class="w-full border p-3 rounded-xl text-xs font-bold">
                    <input type="number" id="s-Diamond" placeholder="ml" class="w-full border p-3 rounded-xl text-xs font-bold">
                </div>
            </div>
            <button type="submit" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Simpan Bibit</button>
        </form>

        <div id="list-stok-bibit" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <div id="sec-analitik" class="p-4 hidden">
        <div class="bg-gold p-8 rounded-[40px] text-white shadow-2xl relative overflow-hidden mb-6">
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-80 mb-2">Total Omzet (Selesai)</p>
            <h2 id="total-omzet" class="text-4xl font-black tracking-tighter">Rp 0</h2>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", // Ganti dengan config asli Anda
            authDomain: "mi-perfume.firebaseapp.com",
            projectId: "mi-perfume",
            storageBucket: "mi-perfume.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let globalBibit = [];

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('admin-info').innerText = user.email;
                loadAdminData();
            } else {
                window.location.href = "index.html"; 
            }
        });

        function loadAdminData() {
            // Load Bibit
            db.collection("stok").onSnapshot(snap => {
                const list = document.getElementById('list-stok-bibit');
                list.innerHTML = '';
                globalBibit = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    globalBibit.push({ id: doc.id, ...d });
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                            <div class="flex justify-between items-start mb-4">
                                <h4 class="font-black text-sm uppercase">${d.nama}</h4>
                                <button onclick="deleteBibit('${doc.id}')" class="text-red-500 text-xs font-bold">Hapus</button>
                            </div>
                            <div class="grid grid-cols-2 gap-4 text-[10px] font-bold uppercase">
                                <div>
                                    <p class="text-gray-400 mb-1">Stok:</p>
                                    <p>STD: ${d.stok_kelas.Standar || 0}ml</p>
                                    <p>PRE: ${d.stok_kelas.Premium || 0}ml</p>
                                    <p>SPR: ${d.stok_kelas['Super Premium'] || 0}ml</p>
                                    <p>DIA: ${d.stok_kelas.Diamond || 0}ml</p>
                                </div>
                                <div>
                                    <p class="text-gray-400 mb-1">Harga:</p>
                                    <p>STD: ${d.harga_kelas.Standar || 0}</p>
                                    <p>PRE: ${d.harga_kelas.Premium || 0}</p>
                                    <p>SPR: ${d.harga_kelas['Super Premium'] || 0}</p>
                                    <p>DIA: ${d.harga_kelas.Diamond || 0}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });

            // Load Pesanan
            db.collection("pesanan").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('list-admin-pesanan');
                const omzetEl = document.getElementById('total-omzet');
                let omzet = 0;
                list.innerHTML = '';

                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status === "Selesai") omzet += d.total;

                    // Tampilkan hanya yang belum selesai di list pesanan
                    if(d.status !== "Selesai") {
                        let actionBtn = "";
                        if(d.status === "Menunggu di proses") {
                            actionBtn = `<button onclick="prosesPesanan('${doc.id}', true)" class="flex-1 bg-gold text-white py-3 rounded-2xl font-bold text-[10px] uppercase">Terima & Potong Stok</button>`;
                        } else if(d.status === "Sedang di proses") {
                            actionBtn = `<button onclick="prosesPesanan('${doc.id}', false)" class="flex-1 bg-gray-900 text-white py-3 rounded-2xl font-bold text-[10px] uppercase">Selesaikan</button>`;
                        }

                        list.innerHTML += `
                            <div class="bg-white p-5 rounded-3xl shadow-sm border-2 ${d.status === 'Sedang di proses' ? 'border-blue-200' : 'border-transparent'}">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="text-[10px] font-black uppercase text-gray-400">${d.status}</span>
                                </div>
                                <div class="mb-4">
                                    ${d.items.map(i => `<p class="text-xs font-bold">${i.qty}x ${i.aroma} <span class="text-gray-400">(${i.kelas})</span></p>`).join('')}
                                </div>
                                <div class="flex gap-2">${actionBtn}</div>
                            </div>
                        `;
                    }
                });
                omzetEl.innerText = `Rp ${omzet.toLocaleString()}`;
            });
        }

        async function handleSimpanBibit(e) {
            e.preventDefault();
            const nama = document.getElementById('nama-bibit').value.trim();
            const qualities = ['Standar', 'Premium', 'Super Premium', 'Diamond'];
            
            let newStok = {};
            let newHarga = {};

            qualities.forEach(q => {
                const qId = q.replace(' ', '-');
                newStok[q] = parseInt(document.getElementById(`s-${qId}`).value) || 0;
                newHarga[q] = parseInt(document.getElementById(`h-${qId}`).value) || 0;
            });

            // Cek apakah bibit sudah ada
            const existing = globalBibit.find(b => b.nama.toLowerCase() === nama.toLowerCase());

            if(existing) {
                // Update: Jumlahkan stok, Replace harga
                let updatedStok = { ...existing.stok_kelas };
                let updatedHarga = { ...existing.harga_kelas };
                
                qualities.forEach(q => {
                    updatedStok[q] = (updatedStok[q] || 0) + newStok[q];
                    // Jika admin menginput harga baru (tidak 0), maka replace. Jika 0, tetap harga lama.
                    if(newHarga[q] > 0) updatedHarga[q] = newHarga[q];
                });

                await db.collection("stok").doc(existing.id).update({
                    stok_kelas: updatedStok,
                    harga_kelas: updatedHarga
                });
                alert("Stok bibit berhasil ditambahkan!");
            } else {
                // Create baru
                await db.collection("stok").add({
                    nama: nama,
                    stok_kelas: newStok,
                    harga_kelas: newHarga
                });
                alert("Bibit baru berhasil didaftarkan!");
            }
            e.target.reset();
        }

        async function prosesPesanan(id, isTerima) {
            if(isTerima) {
                // Flow Terima: Potong stok & ubah status ke "Sedang di proses"
                const res = await db.collection("pesanan").doc(id).get();
                const items = res.data().items;

                // Loop potong stok
                for(let item of items) {
                    const bibitRef = db.collection("stok").doc(item.bibitId);
                    const bDoc = await bibitRef.get();
                    if(bDoc.exists) {
                        let stokSekarang = bDoc.data().stok_kelas;
                        // Kurangi 1 qty (asumsi per botol 1 unit atau sesuaikan logic Anda)
                        stokSekarang[item.kelas] = (stokSekarang[item.kelas] || 0) - item.qty;
                        await bibitRef.update({ stok_kelas: stokSekarang });
                    }
                }
                await db.collection("pesanan").doc(id).update({ status: "Sedang di proses" });
            } else {
                // Flow Selesaikan: Ubah status ke "Selesai"
                await db.collection("pesanan").doc(id).update({ status: "Selesai" });
            }
        }

        function deleteBibit(id) { if(confirm('Hapus bibit?')) db.collection("stok").doc(id).delete(); }

        function switchTab(t) {
            ['pesanan', 'stok', 'analitik'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('t-' + s).classList.remove('tab-active', 'text-gray-400');
            });
            document.getElementById('sec-' + t).classList.remove('hidden');
            document.getElementById('t-' + t).classList.add('tab-active');
        }
    </script>
</body>
</html>
