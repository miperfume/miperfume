<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - MI Perfume</title>
    <link rel="apple-touch-icon" href="logo.jpeg">
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style> 
        .tab-active { border-bottom: 3px solid #a38d58; color: #a38d58; font-weight: bold; } 
        .text-gold { color: #a38d58; } .bg-gold { background-color: #a38d58; } 
        .hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <div id="login-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-100 px-4">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border-t-4 border-[#a38d58]">
            <img src="logo.jpeg" class="h-16 w-auto mx-auto mb-2 rounded"><h1 class="text-2xl font-bold text-center text-[#a38d58] mb-4">Admin System</h1>
            <form id="form-login" onsubmit="prosesLogin(event)"><div class="mb-4"><input type="text" id="input-user" required class="w-full border p-3 rounded" placeholder="Username"></div><div class="mb-6 relative"><input type="password" id="input-pass" required class="w-full border p-3 rounded" placeholder="Password"><button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-3">👁️</button></div><button type="submit" class="w-full bg-gold text-white font-bold py-3 rounded">Masuk</button></form>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <header class="bg-gray-800 text-white p-3 sticky top-0 z-20 flex justify-between items-center">
            <div class="flex items-center gap-2"><img src="logo.jpeg" class="h-8 w-8 rounded"><h1 class="font-bold text-[#a38d58]">MI Perfume</h1></div>
            <button onclick="logoutAdmin()" class="text-xs bg-red-500 px-3 py-1 rounded">Logout</button>
        </header>

        <div class="flex bg-white shadow-sm mb-4 sticky top-[56px] z-10 overflow-x-auto hide-scrollbar">
            <button id="tab-pesanan" class="py-3 px-4 tab-active text-xs font-bold whitespace-nowrap" onclick="switchTab('pesanan')">Pesanan</button>
            <button id="tab-stok" class="py-3 px-4 text-gray-500 text-xs font-bold whitespace-nowrap" onclick="switchTab('stok')">Stok & Modal</button>
            <button id="tab-dashboard" class="py-3 px-4 text-gray-500 text-xs font-bold whitespace-nowrap" onclick="switchTab('dashboard')">Analitik</button>
            <button id="tab-restock" class="py-3 px-4 text-gray-500 text-xs font-bold whitespace-nowrap" onclick="switchTab('restock')">Restock 🛒</button>
            <button id="tab-followup" class="py-3 px-4 text-gray-500 text-xs font-bold whitespace-nowrap" onclick="switchTab('followup')">Follow-Up 💬</button>
        </div>

        <div id="page-pesanan" class="p-4 max-w-md mx-auto space-y-4"><div id="daftar-pesanan"></div></div>

        <div id="page-stok" class="p-4 max-w-md mx-auto hidden">
            <div class="bg-white p-4 rounded-xl shadow mb-6 border-t-4 border-[#a38d58]">
                <h2 class="font-bold text-gray-700 mb-3 text-sm">💧 Update/Tambah Bibit Parfum</h2>
                <form onsubmit="simpanBibit(event)">
                    <div class="mb-3">
                        <label class="block text-xs text-gray-500 mb-1">Pilih / Buat Aroma</label>
                        <select id="bibit-pilih" class="w-full border p-2 rounded text-sm bg-gray-50 mb-1" onchange="toggleBibitBaru()"><option value="_NEW_">➕ BUAT AROMA BARU...</option></select>
                        <input type="text" id="bibit-nama" class="w-full border p-2 rounded text-sm uppercase mt-2" placeholder="Ketik nama aroma baru...">
                    </div>
                    <div class="mb-3"><label class="block text-xs text-gray-500 mb-1">Tambah Stok Bibit (ml)</label><input type="number" id="bibit-ml" required min="0" class="w-full border p-2 rounded text-sm"></div>
                    
                    <div class="mb-3 bg-gray-50 p-2 rounded border">
                        <label class="block text-xs font-bold text-gray-600 mb-2">Harga Modal (Rp/ml) per Kelas:</label>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <div><label class="flex items-center gap-1"><input type="checkbox" id="cb-standar" checked onchange="toggleModalInput('Standar')"> Standar</label><input type="number" id="m-standar" class="w-full border p-1 rounded mt-1" placeholder="Modal"></div>
                            <div><label class="flex items-center gap-1"><input type="checkbox" id="cb-premium" checked onchange="toggleModalInput('Premium')"> Premium</label><input type="number" id="m-premium" class="w-full border p-1 rounded mt-1" placeholder="Modal"></div>
                            <div><label class="flex items-center gap-1"><input type="checkbox" id="cb-super" checked onchange="toggleModalInput('Super Premium')"> Super Premium</label><input type="number" id="m-super" class="w-full border p-1 rounded mt-1" placeholder="Modal"></div>
                            <div><label class="flex items-center gap-1"><input type="checkbox" id="cb-diamond" checked onchange="toggleModalInput('Diamond')"> Diamond</label><input type="number" id="m-diamond" class="w-full border p-1 rounded mt-1" placeholder="Modal"></div>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-gray-800 text-white py-2 rounded text-sm font-bold shadow active:scale-95">Simpan Data Bibit</button>
                </form>
            </div>
            <div class="bg-white p-4 rounded-xl shadow mb-6 border-t-4 border-blue-500">
                <h2 class="font-bold text-gray-700 mb-3 text-sm">🧴 Update Botol & Absolute</h2>
                <form onsubmit="simpanBahan(event)">
                    <div class="mb-3"><select id="bahan-id" required class="w-full border p-2 rounded text-sm"><option value="botol_35">Botol 35 ml</option><option value="botol_50">Botol 50 ml</option><option value="botol_100">Botol 100 ml</option><option value="abs_standar">Absolute Standar</option><option value="abs_khusus">Absolute Khusus</option></select></div>
                    <div class="flex gap-2 mb-3"><input type="number" id="bahan-qty" required class="w-full border p-2 rounded text-sm" placeholder="Tambah Stok Baru"><input type="number" id="bahan-harga" required class="w-full border p-2 rounded text-sm" placeholder="Modal Satuan (Rp)"></div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded text-sm font-bold shadow active:scale-95">Update Bahan</button>
                </form>
            </div>
            <h2 class="font-bold text-gray-700 mb-2 text-sm border-b pb-1">Daftar Stok Saat Ini</h2>
            <div id="daftar-bahan" class="mb-4 space-y-2"></div><div id="daftar-bibit" class="space-y-2"></div>
        </div>

        <div id="page-dashboard" class="p-4 max-w-md mx-auto hidden">
            <div class="flex justify-between items-center border-b pb-1 mb-3">
                <h2 class="font-bold text-gray-700 text-sm">Laporan Keuangan</h2>
                <button onclick="exportExcel()" class="bg-green-600 text-white text-xs px-2 py-1 rounded shadow">📥 Download CSV</button>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4"><div class="bg-white p-3 rounded-xl shadow border-l-4 border-[#a38d58]"><p class="text-[10px] text-gray-500">OMSET</p><p id="dash-omset" class="text-md font-bold">Rp 0</p></div><div class="bg-white p-3 rounded-xl shadow border-l-4 border-red-400"><p class="text-[10px] text-gray-500">HPP</p><p id="dash-hpp" class="text-md font-bold text-red-600">Rp 0</p></div></div>
            <div class="bg-gradient-to-r from-gray-800 to-gray-700 p-4 rounded-xl shadow mb-6 flex justify-between items-center text-white"><div><p class="text-xs text-gray-300 mb-1">LABA BERSIH</p><p id="dash-laba" class="text-2xl font-bold text-[#a38d58]">Rp 0</p></div><div class="text-right"><p class="text-[10px] text-gray-400">Terjual</p><p id="dash-qty" class="text-lg font-bold">0</p></div></div>
            <div class="bg-white p-4 rounded-xl shadow mb-6"><canvas id="grafikOmset" width="400" height="250"></canvas></div>
            <div class="bg-white p-4 rounded-xl shadow mb-6 border-t-4 border-[#a38d58]"><h2 class="text-sm font-bold mb-3">Top 20 Laris 🚀</h2><div id="daftar-aroma" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div></div>
        </div>

        <div id="page-restock" class="p-4 max-w-md mx-auto hidden"><div class="bg-red-50 p-4 rounded-xl shadow border-t-4 border-red-600 mb-6"><h2 class="font-bold text-red-700 mb-1">🚨 Peringatan Restock</h2><h3 class="text-xs font-bold text-gray-700 mb-2 mt-3">💧 Bibit (< 50 ml)</h3><div id="restock-bibit" class="space-y-2"></div><h3 class="text-xs font-bold text-gray-700 mb-2 mt-3">🧴 Bahan (Menipis)</h3><div id="restock-bahan" class="space-y-2"></div></div></div>
        <div id="page-followup" class="p-4 max-w-md mx-auto hidden"><div class="bg-green-50 p-4 rounded-xl shadow border-t-4 border-green-500 mb-6"><h2 class="font-bold text-green-700 mb-1">💬 Follow-Up WA</h2><div id="daftar-followup" class="space-y-3 mt-3"></div></div></div>
    </div>

    <iframe id="print-frame" style="display:none;"></iframe>

    <script>
        const USERNAME_ADMIN = "admin"; const PASSWORD_ADMIN = "miperfume123";
        if (sessionStorage.getItem("admin_logged_in") === "true") { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-content').classList.remove('hidden'); }
        function prosesLogin(e) { e.preventDefault(); if (document.getElementById('input-user').value.toLowerCase().trim() === USERNAME_ADMIN && document.getElementById('input-pass').value.trim() === PASSWORD_ADMIN) { sessionStorage.setItem("admin_logged_in", "true"); location.reload(); } else alert("❌ Salah!"); }
        function logoutAdmin() { if(confirm("Keluar?")) { sessionStorage.removeItem("admin_logged_in"); location.reload(); } }
        function switchTab(t) { ['pesanan','stok','dashboard','restock','followup'].forEach(id => { document.getElementById('page-'+id).classList.add('hidden'); document.getElementById('tab-'+id).classList.replace('tab-active','text-gray-500'); }); document.getElementById('page-'+t).classList.remove('hidden'); document.getElementById('tab-'+t).classList.replace('text-gray-500','tab-active'); }
        function togglePassword() { const p=document.getElementById('input-pass'); p.type=p.type==='password'?'text':'password'; }
    </script>

    <script>
        // --- 11. Request Notifikasi ---
        if ("Notification" in window && Notification.permission !== "granted") Notification.requestPermission();

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
  apiKey: "AIzaSyDlrX84TqRgJS902PdjH8awCQacO6hzStY",
  authDomain: "mi-perfume-1989.firebaseapp.com",
  databaseURL: "https://mi-perfume-1989-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mi-perfume-1989",
  storageBucket: "mi-perfume-1989.firebasestorage.app",
  messagingSenderId: "894897183896",
  appId: "1:894897183896:web:71372dc8cbb9056c7144ed",
  measurementId: "G-H2KG1X9KVN"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let chartInstance = null; let globalBibit = []; let globalBahan = []; let dataPesananExport = [];

        // --- MANAJEMEN MULTI-HPP BIBIT ---
        function toggleBibitBaru() { const v = document.getElementById('bibit-pilih').value; document.getElementById('bibit-nama').style.display = v === '_NEW_' ? 'block' : 'none'; }
        function toggleModalInput(id) { const cb = document.getElementById('cb-'+id.toLowerCase().split(' ')[0]); document.getElementById('m-'+id.toLowerCase().split(' ')[0]).disabled = !cb.checked; }
        
        function simpanBibit(e) { 
            e.preventDefault(); 
            const isNew = document.getElementById('bibit-pilih').value === '_NEW_';
            const nama = isNew ? document.getElementById('bibit-nama').value.trim().toUpperCase() : document.getElementById('bibit-pilih').value;
            const tambahMl = parseInt(document.getElementById('bibit-ml').value); 
            
            let modObj = {}; let klsArr = [];
            ['Standar','Premium','Super Premium','Diamond'].forEach(k => {
                let pid = k.toLowerCase().split(' ')[0];
                if(document.getElementById('cb-'+pid).checked) { klsArr.push(k); modObj[k] = parseInt(document.getElementById('m-'+pid).value)||0; }
            });
            if(klsArr.length === 0) return alert("Pilih minimal 1 kelas!");

            const docRef = db.collection("stok").doc(nama);
            docRef.get().then(doc => {
                let finalMl = doc.exists ? (doc.data().sisa_ml || 0) + tambahMl : tambahMl;
                docRef.set({ nama: nama, sisa_ml: finalMl, modal: modObj, kelas_tersedia: klsArr }, {merge: true})
                .then(() => { alert("Stok Berhasil Diupdate!"); document.getElementById('bibit-ml').value=''; if(isNew)document.getElementById('bibit-nama').value=''; });
            });
        }

        db.collection("stok").orderBy("nama").onSnapshot(snap => { 
            const wadah = document.getElementById('daftar-bibit'); const sel = document.getElementById('bibit-pilih');
            wadah.innerHTML = ''; sel.innerHTML = '<option value="_NEW_">➕ BUAT AROMA BARU...</option>'; globalBibit = []; 
            snap.forEach(doc => { 
                const data = doc.data(); globalBibit.push(data);
                sel.innerHTML += `<option value="${data.nama}">${data.nama}</option>`;
                let hrgList = Object.entries(data.modal||{}).map(([k,v])=>`${k}: Rp${v}`).join(' | ');
                wadah.innerHTML += `<div class="bg-white p-3 rounded border flex justify-between items-center"><div><p class="font-bold text-sm">💧 ${data.nama}</p><p class="text-[9px] text-gray-500">${hrgList}</p></div><div class="flex items-center gap-3"><span class="text-sm font-bold text-green-600">${data.sisa_ml} ml</span><button onclick="hapusDokumen('stok', '${doc.id}')" class="text-red-500">🗑️</button></div></div>`; 
            }); cekRestock(); 
        });

        // --- BAHAN LOGIC ---
        const namaBahan = { "botol_35": "Botol 35 ml (pcs)", "botol_50": "Botol 50 ml (pcs)", "botol_100": "Botol 100 ml (pcs)", "abs_standar": "Absolute Standar (ml)", "abs_khusus": "Absolute Khusus (ml)" };
        function simpanBahan(e) { e.preventDefault(); const id = document.getElementById('bahan-id').value; const qty = parseInt(document.getElementById('bahan-qty').value); const harga = parseInt(document.getElementById('bahan-harga').value); db.collection("bahan").doc(id).get().then(doc=>{ let current = doc.exists ? doc.data().sisa||0 : 0; db.collection("bahan").doc(id).set({ id: id, nama: namaBahan[id], sisa: current+qty, harga_satuan: harga }, {merge:true}).then(()=>alert("Bahan diupdate!")); }); }
        db.collection("bahan").orderBy("id").onSnapshot(snap => { const wadah = document.getElementById('daftar-bahan'); wadah.innerHTML = ''; globalBahan = []; snap.forEach(doc => { const data = doc.data(); data.doc_id = doc.id; globalBahan.push(data); const unit = doc.id.includes('botol') ? 'pcs' : 'ml'; wadah.innerHTML += `<div class="bg-blue-50 p-2 rounded border flex justify-between"><div><p class="font-bold text-xs">${data.nama}</p><p class="text-[10px]">Rp${data.harga_satuan}/${unit}</p></div><span class="font-bold text-blue-700">${data.sisa} ${unit}</span></div>`; }); cekRestock(); });
        function hapusDokumen(col, id) { if(confirm("Hapus?")) db.collection(col).doc(id).delete(); }

        // --- RESTOCK & FOLLOW UP (Singkat) ---
        function cekRestock() { /*...logika sama, di-compress...*/ }

        // --- PESANAN & NOTIF & PRINT ---
        let isInitialLoad = true;
        db.collection("pesanan").orderBy("waktu", "desc").onSnapshot(snapshot => {
            const containerPesanan = document.getElementById('daftar-pesanan'); containerPesanan.innerHTML = ''; 
            let totalOmset = 0, totalHPP = 0, totalQty = 0; const rekapBulanan = {}; const rekapAroma = {}; dataPesananExport = [];
            const blnSkg = new Date().toLocaleDateString('id-ID', { month: 'short', year: 'numeric' });

            snapshot.docChanges().forEach(change => {
                // 11. Push Notifikasi jika ada pesanan baru
                if (!isInitialLoad && change.type === "added" && change.doc.data().status === "Menunggu Diproses") {
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification("MI Perfume: Pesanan Baru!", { body: `Ada pesanan dari ${change.doc.data().nama}. Segera proses!`, icon: 'logo.jpeg' });
                    }
                }
            });
            isInitialLoad = false;

            snapshot.forEach((doc) => {
                const data = doc.data(); const id = doc.id; 
                let tglExport = data.waktu ? data.waktu.toDate().toLocaleString('id-ID') : '-';
                dataPesananExport.push({ Tanggal: tglExport, Nama: data.nama, WA: data.no_wa||'-', Omset: data.total, HPP: data.total_hpp||0, Laba: data.total-(data.total_hpp||0), Status: data.status });

                const itemsJSON = encodeURIComponent(JSON.stringify(data.items||[]));
                let detHTML = (data.items||[]).map(i => `<p class="text-sm border-b pb-1"><b>${i.qty}x</b> ${i.aroma} (${i.kelas} ${i.ukuran}ml)</p>`).join('');

                containerPesanan.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-[#a38d58]">
                        <div class="flex justify-between items-start mb-2 border-b pb-2">
                            <div><h3 class="font-bold text-gray-800">${data.nama}</h3><p class="text-xs text-gray-500">${data.no_wa||''}</p></div>
                            <div class="text-right"><span class="text-[10px] font-bold px-2 py-1 rounded bg-gray-100 block mb-1">${data.status}</span>
                            <button onclick="cetakStruk('${encodeURIComponent(JSON.stringify(data))}')" class="text-xs bg-gray-200 px-2 py-1 rounded shadow">🖨️ Print</button></div>
                        </div>
                        <div class="bg-gray-50 p-2 rounded mb-3 space-y-1">${detHTML}</div>
                        <div class="flex justify-between font-bold"><span class="text-gold">Rp ${(data.total||0).toLocaleString()}</span>
                        ${data.status!=="Selesai"&&data.status!=="Ditolak"?`<button onclick="selesaikanPesanan('${id}')" class="text-xs bg-gray-800 text-white px-3 py-1 rounded">Selesai</button><button onclick="tolakPesanan('${id}','${itemsJSON}')" class="text-xs text-red-500 ml-1">Tolak</button>`:''}</div>
                    </div>`;

                if (data.status === "Selesai") {
                    const bln = data.waktu ? data.waktu.toDate().toLocaleDateString('id-ID', { month: 'short', year: 'numeric' }) : blnSkg;
                    if (!rekapBulanan[bln]) rekapBulanan[bln] = 0; rekapBulanan[bln] += (data.total||0);
                    if (bln === blnSkg) { totalOmset += (data.total||0); totalHPP += (data.total_hpp||0); }
                    (data.items||[]).forEach(i => { if(bln === blnSkg) totalQty += i.qty; rekapAroma[i.aroma] = (rekapAroma[i.aroma]||0) + i.qty; });
                }
            });

            document.getElementById('dash-omset').innerText = 'Rp '+totalOmset.toLocaleString(); document.getElementById('dash-hpp').innerText = 'Rp '+totalHPP.toLocaleString(); document.getElementById('dash-laba').innerText = 'Rp '+(totalOmset-totalHPP).toLocaleString(); document.getElementById('dash-qty').innerText = totalQty;
            renderGrafik(rekapBulanan); renderTopAroma(rekapAroma);
        });

        function selesaikanPesanan(id) { if(confirm("Tandai selesai?")) db.collection("pesanan").doc(id).update({ status: "Selesai" }); }
        function tolakPesanan(id, itemsJSON) { /*...Logika pengembalian stok sama...*/ }

        // --- 4. CETAK THERMAL 58mm ---
        function cetakStruk(dataStr) {
            const data = JSON.parse(decodeURIComponent(dataStr));
            let itemHtml = (data.items||[]).map(i => `<tr><td>${i.qty}x</td><td>${i.aroma} ${i.ukuran}ml</td><td style="text-align:right">${(i.subtotal||0).toLocaleString()}</td></tr>`).join('');
            
            const printWin = window.open('', '_blank', 'width=300,height=500');
            printWin.document.write(`
                <html><head><title>Struk</title><style>
                body{font-family:monospace;width:58mm;margin:0 auto;padding:5px;font-size:12px;color:#000;}
                .c{text-align:center;} .b{border-bottom:1px dashed #000;margin:5px 0;padding-bottom:5px;}
                table{width:100%;font-size:11px;} td{vertical-align:top;}
                </style></head><body>
                <div class="c"><img src="logo.jpeg" style="width:40px;filter:grayscale(100%);"><br><b>MI PERFUME</b><br></div><div class="b"></div>
                Nama: ${data.nama}<br>Status: LUNAS<div class="b"></div>
                <table>${itemHtml}</table><div class="b"></div>
                <div style="text-align:right"><b>Total: Rp ${data.total.toLocaleString()}</b></div>
                <div class="c" style="margin-top:10px">Terima Kasih</div>
                <script>window.onload=()=>{window.print();window.close();}<\/script>
                </body></html>`);
            printWin.document.close();
        }

        // --- 6. EXPORT EXCEL (CSV) ---
        function exportExcel() {
            if(dataPesananExport.length===0) return alert("Data kosong");
            let csv = "Tanggal,Nama Pemesan,WhatsApp,Omset,HPP Modal,Laba Bersih,Status\n";
            dataPesananExport.forEach(row => { csv += `"${row.Tanggal}","${row.Nama}","${row.WA}",${row.Omset},${row.HPP},${row.Laba},"${row.Status}"\n`; });
            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let url = window.URL.createObjectURL(blob);
            let a = document.createElement("a"); a.href = url; a.download = "Laporan_MI_Perfume.csv"; a.click();
        }

        function renderGrafik(d) { /*...Logika grafik sama...*/ }
        function renderTopAroma(d) { /*...Logika Top Aroma sama...*/ }
    </script>
</body>
</html>
