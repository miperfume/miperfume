<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - MI Perfume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style> .tab-active { border-bottom: 3px solid #a38d58; color: #a38d58; font-weight: bold; } .text-gold { color: #a38d58; } .bg-gold { background-color: #a38d58; } </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <div id="login-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-100 px-4">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border-t-4 border-[#a38d58]">
            <h1 class="text-2xl font-bold text-center text-[#a38d58] mb-4">MI Perfume</h1>
            <h2 class="text-center text-gray-600 mb-6 font-medium">Login Admin Area</h2>
            <form id="form-login" onsubmit="prosesLogin(event)">
                <div class="mb-4"><input type="text" id="input-user" required class="w-full border p-3 rounded-lg outline-none" placeholder="Username"></div>
                <div class="mb-6 relative w-full">
                    <input type="password" id="input-pass" required class="w-full border p-3 rounded-lg outline-none pr-14" placeholder="Password">
                    <div class="absolute inset-y-0 right-0 flex items-center"><button type="button" onclick="togglePassword()" class="p-3 text-xl">👁️</button></div>
                </div>
                <button type="submit" class="w-full bg-gold text-white font-bold py-3 rounded-lg shadow active:scale-95">Masuk</button>
            </form>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <header class="bg-gray-800 text-white p-4 sticky top-0 z-20 flex justify-between items-center">
            <h1 class="text-lg font-bold text-[#a38d58]">MI Perfume Admin</h1>
            <button onclick="logoutAdmin()" class="text-xs bg-red-500 px-3 py-1 rounded">Logout</button>
        </header>

        <div class="flex bg-white shadow-sm mb-4 sticky top-[60px] z-10">
            <button id="tab-pesanan" class="flex-1 py-3 text-center tab-active text-xs font-bold" onclick="switchTab('pesanan')">Pesanan</button>
            <button id="tab-stok" class="flex-1 py-3 text-center text-gray-500 text-xs font-bold" onclick="switchTab('stok')">Stok & Modal</button>
            <button id="tab-dashboard" class="flex-1 py-3 text-center text-gray-500 text-xs font-bold" onclick="switchTab('dashboard')">Analitik</button>
        </div>

        <div id="page-pesanan" class="p-4 max-w-md mx-auto space-y-4"><div id="daftar-pesanan"></div></div>

        <div id="page-stok" class="p-4 max-w-md mx-auto hidden">
            
            <div class="bg-white p-4 rounded-xl shadow mb-6 border-t-4 border-[#a38d58]">
                <h2 class="font-bold text-gray-700 mb-3 text-sm">💧 Tambah Bibit Parfum</h2>
                <form onsubmit="simpanBibit(event)">
                    <div class="grid grid-cols-3 gap-2 items-end mb-3">
                        <div class="col-span-3">
                            <label class="block text-xs text-gray-500 mb-1">Nama Aroma</label>
                            <input type="text" id="bibit-nama" required class="w-full border p-2 rounded text-sm uppercase" placeholder="Misal: BACCARAT">
                        </div>
                        <div class="col-span-1">
                            <label class="block text-xs text-gray-500 mb-1">Stok (ml)</label>
                            <input type="number" id="bibit-ml" required min="0" class="w-full border p-2 rounded text-sm text-center">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs text-gray-500 mb-1">Harga Modal (Rp / ml)</label>
                            <input type="number" id="bibit-harga" required min="0" class="w-full border p-2 rounded text-sm text-center" placeholder="Misal: 1500">
                        </div>
                    </div>
                    <div class="mb-3 bg-gray-50 p-2 rounded border">
                        <label class="block text-xs font-bold text-gray-600 mb-2">Kelas yang Tersedia:</label>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="kelas_stok" value="Standar" checked> Standar</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="kelas_stok" value="Premium" checked> Premium</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="kelas_stok" value="Super Premium" checked> Super Premium</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="kelas_stok" value="Diamond" checked> Diamond</label>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-gray-800 text-white px-4 py-2 rounded text-sm font-bold shadow active:scale-95">Simpan Bibit</button>
                </form>
            </div>

            <div class="bg-white p-4 rounded-xl shadow mb-6 border-t-4 border-blue-500">
                <h2 class="font-bold text-gray-700 mb-3 text-sm">🧴 Update Botol & Absolute</h2>
                <form onsubmit="simpanBahan(event)">
                    <div class="mb-3">
                        <label class="block text-xs text-gray-500 mb-1">Pilih Bahan Baku</label>
                        <select id="bahan-id" required class="w-full border p-2 rounded text-sm bg-gray-50">
                            <option value="botol_35">Botol 35 ml (pcs)</option>
                            <option value="botol_50">Botol 50 ml (pcs)</option>
                            <option value="botol_100">Botol 100 ml (pcs)</option>
                            <option value="abs_standar">Absolute Standar (ml)</option>
                            <option value="abs_khusus">Absolute Khusus (ml)</option>
                        </select>
                    </div>
                    <div class="flex gap-2 mb-3">
                        <div class="flex-1">
                            <label class="block text-xs text-gray-500 mb-1">Jumlah Stok Baru</label>
                            <input type="number" id="bahan-qty" required min="0" class="w-full border p-2 rounded text-sm text-center">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs text-gray-500 mb-1">Modal Satuan (Rp)</label>
                            <input type="number" id="bahan-harga" required min="0" class="w-full border p-2 rounded text-sm text-center">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold shadow active:scale-95">Update Bahan Baku</button>
                </form>
            </div>

            <h2 class="font-bold text-gray-700 mb-2 text-sm border-b pb-1">Daftar Stok Saat Ini</h2>
            <div id="daftar-bahan" class="mb-4 space-y-2"></div>
            <div id="daftar-bibit" class="space-y-2"></div>
        </div>

        <div id="page-dashboard" class="p-4 max-w-md mx-auto hidden">
            <h2 class="font-bold text-gray-700 mb-3 text-sm border-b pb-1">Laporan Keuangan (Bulan Ini)</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-white p-3 rounded-xl shadow border-l-4 border-[#a38d58]">
                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">Total Omset</p>
                    <p id="dash-omset" class="text-md font-bold text-gray-800">Rp 0</p>
                </div>
                <div class="bg-white p-3 rounded-xl shadow border-l-4 border-red-400">
                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">Modal Terpakai (HPP)</p>
                    <p id="dash-hpp" class="text-md font-bold text-red-600">Rp 0</p>
                </div>
            </div>
            <div class="bg-gradient-to-r from-gray-800 to-gray-700 p-4 rounded-xl shadow mb-6 flex justify-between items-center text-white">
                <div>
                    <p class="text-xs text-gray-300 uppercase tracking-wider mb-1">Laba Bersih / Profit</p>
                    <p id="dash-laba" class="text-2xl font-bold text-[#a38d58]">Rp 0</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-400">Botol Terjual</p>
                    <p id="dash-qty" class="text-lg font-bold">0</p>
                </div>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow mb-6"><h2 class="text-sm font-bold mb-3">Top 20 Laris 🚀</h2><div id="daftar-aroma" class="space-y-2"></div></div>
        </div>
    </div>

    <script>
        const USERNAME_ADMIN = "admin"; const PASSWORD_ADMIN = "miperfume123";
        function togglePassword() { const p = document.getElementById('input-pass'), e = document.getElementById('eye-icon'); p.type = p.type === 'password' ? 'text' : 'password'; e.innerText = p.type === 'password' ? '👁️' : '🙈'; }
        if (sessionStorage.getItem("admin_logged_in") === "true") { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-content').classList.remove('hidden'); }
        function prosesLogin(e) { e.preventDefault(); if (document.getElementById('input-user').value.toLowerCase().trim() === USERNAME_ADMIN && document.getElementById('input-pass').value.trim() === PASSWORD_ADMIN) { sessionStorage.setItem("admin_logged_in", "true"); document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-content').classList.remove('hidden'); } else alert("❌ Salah!"); }
        function logoutAdmin() { if(confirm("Keluar?")) { sessionStorage.removeItem("admin_logged_in"); location.reload(); } }
        function switchTab(t) { 
            ['pesanan','stok','dashboard'].forEach(id => { document.getElementById('page-'+id).classList.add('hidden'); document.getElementById('tab-'+id).classList.replace('tab-active','text-gray-500'); });
            document.getElementById('page-'+t).classList.remove('hidden'); document.getElementById('tab-'+t).classList.replace('text-gray-500','tab-active');
        }
    </script>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyDlrX84TqRgJS902PdjH8awCQacO6hzStY",
  authDomain: "mi-perfume-1989.firebaseapp.com",
  databaseURL: "https://mi-perfume-1989-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mi-perfume-1989",
  storageBucket: "mi-perfume-1989.firebasestorage.app",
  messagingSenderId: "894897183896",
  appId: "1:894897183896:web:71372dc8cbb9056c7144ed",
  measurementId: "G-H2KG1X9KVN"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // NAMA CANTIK UNTUK BAHAN
        const namaBahan = {
            "botol_35": "Botol 35 ml (pcs)", "botol_50": "Botol 50 ml (pcs)", "botol_100": "Botol 100 ml (pcs)",
            "abs_standar": "Absolute Standar (ml)", "abs_khusus": "Absolute Khusus (ml)"
        };

        // --- MANAJEMEN BIBIT ---
        function simpanBibit(e) {
            e.preventDefault();
            const nama = document.getElementById('bibit-nama').value.trim().toUpperCase();
            const ml = parseInt(document.getElementById('bibit-ml').value);
            const harga = parseInt(document.getElementById('bibit-harga').value);
            const kelasTersedia = Array.from(document.querySelectorAll('input[name="kelas_stok"]:checked')).map(cb => cb.value);
            
            if(kelasTersedia.length === 0) return alert("Pilih minimal 1 kelas!");

            db.collection("stok").doc(nama).set({ nama: nama, sisa_ml: ml, harga_ml: harga, kelas_tersedia: kelasTersedia })
            .then(() => { document.getElementById('bibit-nama').value=''; document.getElementById('bibit-ml').value=''; document.getElementById('bibit-harga').value=''; alert("Bibit diupdate!"); })
            .catch(err => alert("Error: " + err));
        }

        db.collection("stok").orderBy("nama").onSnapshot(snap => {
            const wadah = document.getElementById('daftar-bibit'); wadah.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                const hrg = data.harga_ml ? `Modal: Rp${data.harga_ml}/ml` : 'Modal: Belum diatur';
                wadah.innerHTML += `
                    <div class="bg-white p-3 rounded border flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm text-gray-700">💧 ${data.nama}</p>
                            <p class="text-[10px] text-gray-500">${hrg}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="${data.sisa_ml < 50 ? 'text-red-600 font-bold' : 'text-green-600'} text-sm">${data.sisa_ml} ml</span>
                            <button onclick="hapusDokumen('stok', '${doc.id}')" class="text-xs text-red-500">🗑️</button>
                        </div>
                    </div>
                `;
            });
        });

        // --- MANAJEMEN BAHAN (BOTOL & ABSOLUTE) ---
        function simpanBahan(e) {
            e.preventDefault();
            const id = document.getElementById('bahan-id').value;
            const qty = parseInt(document.getElementById('bahan-qty').value);
            const harga = parseInt(document.getElementById('bahan-harga').value);

            db.collection("bahan").doc(id).set({ id: id, nama: namaBahan[id], sisa: qty, harga_satuan: harga })
            .then(() => { document.getElementById('bahan-qty').value=''; document.getElementById('bahan-harga').value=''; alert("Bahan Baku diupdate!"); })
            .catch(err => alert("Error: " + err));
        }

        db.collection("bahan").orderBy("id").onSnapshot(snap => {
            const wadah = document.getElementById('daftar-bahan'); wadah.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                const unit = doc.id.includes('botol') ? 'pcs' : 'ml';
                wadah.innerHTML += `
                    <div class="bg-blue-50 p-2 rounded border border-blue-100 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-xs text-gray-700">${data.nama}</p>
                            <p class="text-[10px] text-gray-500">Modal: Rp${data.harga_satuan}/${unit}</p>
                        </div>
                        <span class="${data.sisa < 20 ? 'text-red-600 font-bold' : 'text-blue-700'} text-sm font-bold">${data.sisa} ${unit}</span>
                    </div>
                `;
            });
        });

        function hapusDokumen(koleksi, id) { if(confirm("Hapus data ini?")) db.collection(koleksi).doc(id).delete(); }

        // --- MANAJEMEN PESANAN & DASHBOARD HPP ---
        db.collection("pesanan").orderBy("waktu", "desc").onSnapshot(snapshot => {
            const containerPesanan = document.getElementById('daftar-pesanan'); containerPesanan.innerHTML = ''; 
            
            let totalOmset = 0, totalHPP = 0, totalQty = 0; const rekapAroma = {};   
            const bulanSekarang = new Date().toLocaleDateString('id-ID', { month: 'short', year: 'numeric' });

            if (snapshot.empty) return containerPesanan.innerHTML = '<p class="text-center text-gray-500 italic mt-4">Belum ada pesanan.</p>';

            snapshot.forEach((doc) => {
                const data = doc.data(); const id = doc.id; 
                let statusColor = data.status==="Selesai" ? "bg-green-100 text-green-700" : (data.status==="Ditolak" ? "bg-red-100 text-red-700" : "bg-yellow-100 text-yellow-700");
                const itemsJSON = data.items ? encodeURIComponent(JSON.stringify(data.items)) : '[]';

                // Hitung total HPP pesanan ini (Jika data lama tidak punya HPP, anggap 0)
                const pesananHPP = data.total_hpp || 0;

                let actionButtons = data.status !== "Selesai" && data.status !== "Ditolak" ? `
                    <div class="flex gap-2 mt-4 border-t pt-3">
                        <button onclick="selesaikanPesanan('${id}')" class="flex-1 bg-gray-800 text-white text-sm py-2 rounded shadow">Selesai</button>
                        <button onclick="tolakPesanan('${id}', '${itemsJSON}')" class="flex-1 bg-red-100 text-red-700 font-bold text-sm py-2 rounded border border-red-200">Tolak</button>
                    </div>` : '';

                let detailHTML = data.items ? data.items.map(i => `<div class="text-sm border-b pb-1 mb-1"><p><b>${i.qty}x</b> ${i.aroma} <span class="text-xs text-gray-500">(${i.kelas} ${i.ukuran}ml)</span></p><p class="text-[10px] text-gray-400">HPP Item: Rp ${(i.hpp_total || 0).toLocaleString('id-ID')}</p></div>`).join('') : `<div class="text-sm border-b pb-1 mb-1"><b>1x</b> ${data.aroma}</div>`;

                containerPesanan.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-[#a38d58]">
                        <div class="flex justify-between items-start mb-3 border-b pb-2"><h3 class="font-bold text-gray-800">${data.nama}</h3><span class="text-xs font-bold px-2 py-1 rounded ${statusColor}">${data.status}</span></div>
                        <div class="bg-gray-50 p-2 rounded mb-3 space-y-1"><p class="text-xs font-bold text-gray-400 mb-1">RINCIAN:</p>${detailHTML}</div>
                        <div class="flex justify-between items-end">
                            <div><p class="text-[10px] text-gray-500">Modal (HPP): Rp ${pesananHPP.toLocaleString('id-ID')}</p><p class="text-[10px] font-bold text-green-600">Laba: Rp ${(data.total - pesananHPP).toLocaleString('id-ID')}</p></div>
                            <div class="text-right"><span class="text-xs text-gray-500 font-medium block">Bayar:</span><span class="text-lg font-bold text-[#a38d58]">Rp ${data.total.toLocaleString('id-ID')}</span></div>
                        </div>
                        ${data.status==="Ditolak"&&data.alasan ? `<div class="mt-2 bg-red-50 p-2 rounded"><p class="text-xs text-red-600">Alasan: ${data.alasan}</p></div>`:''}
                        ${actionButtons}
                    </div>`;

                // Kalkulasi Laporan Keuangan Bulan Ini
                if (data.status === "Selesai") {
                    const bln = data.waktu ? data.waktu.toDate().toLocaleDateString('id-ID', { month: 'short', year: 'numeric' }) : bulanSekarang;
                    if (bln === bulanSekarang) {
                        totalOmset += data.total;
                        totalHPP += pesananHPP;
                    }
                    (data.items || []).forEach(i => {
                        if (bln === bulanSekarang) totalQty += i.qty;
                        const a = i.aroma.trim().toUpperCase(); rekapAroma[a] = (rekapAroma[a] || 0) + i.qty;
                    });
                }
            });

            document.getElementById('dash-omset').innerText = 'Rp ' + totalOmset.toLocaleString('id-ID'); 
            document.getElementById('dash-hpp').innerText = 'Rp ' + totalHPP.toLocaleString('id-ID'); 
            document.getElementById('dash-laba').innerText = 'Rp ' + (totalOmset - totalHPP).toLocaleString('id-ID'); 
            document.getElementById('dash-qty').innerText = totalQty;
            renderTopAroma(rekapAroma);
        });

        function selesaikanPesanan(id) { if(confirm("Tandai selesai?")) db.collection("pesanan").doc(id).update({ status: "Selesai" }); }
        
        function tolakPesanan(id, itemsJSON) {
            const alasan = prompt("Alasan menolak pesanan:");
            if (alasan && alasan.trim() !== "") {
                const items = JSON.parse(decodeURIComponent(itemsJSON));
                db.collection("pesanan").doc(id).update({ status: "Ditolak", alasan: alasan.trim() })
                .then(() => {
                    items.forEach(item => {
                        // Refund Bibit
                        if (item.bibit) db.collection("stok").doc(item.aroma).update({ sisa_ml: firebase.firestore.FieldValue.increment(item.bibit) });
                        // Refund Botol
                        if (item.id_botol) db.collection("bahan").doc(item.id_botol).update({ sisa: firebase.firestore.FieldValue.increment(item.qty) });
                        // Refund Absolute
                        if (item.id_absolute) db.collection("bahan").doc(item.id_absolute).update({ sisa: firebase.firestore.FieldValue.increment(item.absolute_ml) });
                    });
                    alert("Pesanan ditolak dan semua komponen stok (Bibit, Botol, Absolute) dikembalikan!");
                }).catch(e => alert(e));
            }
        }

        function renderTopAroma(d) { const c=document.getElementById('daftar-aroma'); c.innerHTML=''; Object.entries(d).sort((a,b)=>b[1]-a[1]).slice(0,20).forEach((i,x)=>{ c.innerHTML+=`<div class="flex justify-between border-b pb-1 text-sm"><span class="font-medium">${x<3?['🥇','🥈','🥉'][x]:x+1+'.'} ${i[0]}</span><span class="bg-gold text-white px-2 rounded-full text-xs">${i[1]}</span></div>` }); }
    </script>
</body>
</html>
